# 1. СЕРВЕР HTTP (80): Нужен только для редиректа на HTTPS и для работы Certbot
server {
    listen 80;
    server_name petuhcase.duckdns.org;

    # Это нужно для того, чтобы Certbot мог подтвердить владение доменом
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы на HTTP перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. СЕРВЕР HTTPS (443): Основной рабочий сервер
server {
    listen 443 ssl;
    server_name petuhcase.duckdns.org;

    # Пути к сертификатам, которые монтируются из папки certbot/conf
    ssl_certificate /etc/letsencrypt/live/petuhcase.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/petuhcase.duckdns.org/privkey.pem;

    # Стандартные настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Раздача статики React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Проксирование REST API
    location /api/ {
        proxy_pass http://my-backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование WebSocket
    location /socket.io/ {
        proxy_pass http://my-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

