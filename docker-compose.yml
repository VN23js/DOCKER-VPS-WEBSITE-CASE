services:
  server:
    build: ./server
    container_name: my-backend
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file:
      - ./server/.env
    networks:
      - app-network

  client:
    build: ./my-react-app
    container_name: my-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
