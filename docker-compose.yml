services:
  server:
    build: ./Server
    container_name: my-backend
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    build: ./my-react-app
    container_name: my-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - app-network
    depends_on:
      - server

networks:
  app-network:
    driver: bridge



